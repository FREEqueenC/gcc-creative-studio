<div class="top-left-container fixed z-[101]">
  <ng-container *ngIf="activeWorkspace">
    <div
      class="workspace-container bg-gradient-to-b from-zinc-500/50 to-neutral-700/20 rounded-[48px] shadow-[2px_2px_12px_0px_rgba(0,0,0,0.10)] outline outline-1 outline-offset-[-1px] outline-stone-300/80 backdrop-blur-[10px] z-[1000] flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-zinc-500/60 transition-colors"
      [matMenuTriggerFor]="workspaceMenu"
      [matTooltip]="
        'Organization: ' + (activeWorkspace.organizationName || 'Global') + '\n' +
        'Workspace: ' + activeWorkspace.name
      "
    >
      <mat-icon class="text-sm !w-5 !h-5 leading-5">{{
        activeWorkspace.scope === WorkspaceScope.PUBLIC ? 'public' : 'lock'
      }}</mat-icon>
      <span class="workspace-name text-sm font-medium">{{
        activeWorkspace.name || 'Undefined'
      }}</span>
<mat-icon class="text-white/70 ml-1">unfold_more</mat-icon>
    </div>

    <mat-menu #workspaceMenu="matMenu" xPosition="after" class="workspace-menu-panel">
      <!-- Search Bar (Only for Admins) -->
      <div *ngIf="isAdmin" class="px-4 py-2" (click)="$event.stopPropagation()">
        <mat-form-field appearance="outline" class="w-full text-sm dense-form-field">
          <mat-icon matPrefix>search</mat-icon>
          <input matInput [formControl]="searchControl" placeholder="Search workspaces...">
        </mat-form-field>
      </div>
      <mat-divider *ngIf="isAdmin"></mat-divider>

      <button
        mat-menu-item
        *ngFor="let workspace of filteredWorkspaces$ | async"
        (click)="setActiveWorkspace(workspace.id)"
        class="!h-auto !py-2"
      >
        <div class="flex items-center gap-3 w-full">
          <!-- Check Icon -->
          <mat-icon
            class="!mr-0"
            [style.visibility]="
              activeWorkspaceId === workspace.id ? 'visible' : 'hidden'
            "
            >check</mat-icon
          >
          <!-- Workspace Info -->
          <div class="flex flex-col">
            <div class="flex items-center gap-2">
              <mat-icon class="!w-4 !h-4 !text-[16px] leading-4 text-zinc-400">{{
                workspace.scope === WorkspaceScope.PUBLIC ? 'public' : 'lock'
                }}</mat-icon>
              <span class="font-medium">{{ workspace.name }}</span>
              </div>
              <!-- Organization Context -->
              <div class="flex items-center gap-1 ml-6" *ngIf="workspace.organizationName">
                <mat-icon class="!w-3 !h-3 !text-[12px] leading-3 text-zinc-500">business</mat-icon>
                <span class="text-xs text-zinc-500">{{ workspace.organizationName }}</span>
              </div>
              </div>
              </div>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="openCreateWorkspaceDialog()">
        <mat-icon>add</mat-icon>
        <span>Create New Private Workspace</span>
      </button>
      <button
        mat-menu-item
        (click)="openInviteDialog($event)"
        [disabled]="!canInvite"
        matTooltipPosition="right"
        matTooltip="You can invite users in your Private Workspaces!"
      >
        <mat-icon>person_add</mat-icon>
        <span>Invite Users</span>
      </button>
      <button
        mat-menu-item
        [disabled]="
          !canAccessBrandGuidelines ||
          (brandGuidelineService.activeBrandGuidelineJob$ | async)?.status ===
            JobStatus.PROCESSING
        "
        (click)="openBrandGuidelinesDialog($event)"
      >
        <ng-container
          *ngIf="brandGuidelineService.activeBrandGuidelineJob$ | async as job"
        >
          <mat-spinner
            *ngIf="job.status === JobStatus.PROCESSING"
            [diameter]="20"
            class="inline-block mr-2"
          ></mat-spinner>
          <mat-icon *ngIf="job.status !== JobStatus.PROCESSING">style</mat-icon>
        </ng-container>
        <mat-icon
          *ngIf="!(brandGuidelineService.activeBrandGuidelineJob$ | async)"
          >style</mat-icon
        >
        <span>Brand Guidelines</span>
      </button>

      <mat-divider></mat-divider>
      <button mat-menu-item (click)="openFeedbackForm($event)">
        <mat-icon>feedback</mat-icon>
        <span>Feedback</span>
      </button>
    </mat-menu>
  </ng-container>
</div>
