<div class="image-cropper-container">
  <h2 mat-dialog-title>Edit Your Image</h2>
  <mat-dialog-content>
    <div *ngIf="isConverting" class="loading-overlay">
      <mat-progress-spinner
        mode="indeterminate"
        [diameter]="50"
      ></mat-progress-spinner>
      <p>Converting image...</p>
    </div>

    <div *ngIf="!isConverting" class="editor-workspace-container">
      <!-- Left-side Vertical Dock -->
      <div class="vertical-toolbar">
        <button
          mat-icon-button
          [class.active]="activeMode() === ImageEditorMode.CROP"
          (click)="setMode(ImageEditorMode.CROP)"
          matTooltip="Crop & Rotate"
          id="btn-mode-crop"
        >
          <mat-icon>crop</mat-icon>
        </button>

        <button
          mat-icon-button
          [class.active]="activeMode() === ImageEditorMode.ADJUST"
          (click)="setMode(ImageEditorMode.ADJUST)"
          matTooltip="Selection / Adjust"
          id="btn-mode-adjust"
        >
          <mat-icon>open_with</mat-icon>
        </button>

        <button
          mat-icon-button
          [class.active]="activeMode() === ImageEditorMode.DRAW"
          (click)="setMode(ImageEditorMode.DRAW)"
          matTooltip="Drawing Tools"
          id="btn-mode-draw"
        >
          <mat-icon>brush</mat-icon>
        </button>
      </div>

      <!-- Center/Right Side: Main Workspace -->
      <div class="main-workspace">
        <!-- Floating drawing configuration panel (conditionally visible when draw mode active) -->
        <div class="drawing-panel" *ngIf="activeMode() === ImageEditorMode.DRAW" id="drawing-panel">
          <!-- Tool Selectors -->
          <div class="panel-section">
            <span class="section-label">TOOL</span>
            <div class="tool-selector">
              <button
                mat-icon-button
                [class.active]="activeDrawTool() === DrawingTool.BRUSH"
                (click)="setDrawTool(DrawingTool.BRUSH)"
                matTooltip="Brush"
                id="btn-tool-brush"
              >
                <mat-icon>brush</mat-icon>
              </button>
              <button
                mat-icon-button
                [class.active]="activeDrawTool() === DrawingTool.TEXT"
                (click)="setDrawTool(DrawingTool.TEXT)"
                matTooltip="Text"
                id="btn-tool-text"
              >
                <mat-icon>title</mat-icon>
              </button>
              <button
                mat-icon-button
                [class.active]="activeDrawTool() === DrawingTool.RECTANGLE"
                (click)="setDrawTool(DrawingTool.RECTANGLE)"
                matTooltip="Rectangle"
                id="btn-tool-rect"
              >
                <mat-icon>crop_square</mat-icon>
              </button>
            </div>
          </div>

          <!-- Color Swatches -->
          <div class="panel-section">
            <span class="section-label">COLOR</span>
            <div class="color-swatches-grid">
              <button
                *ngFor="let color of presetColors"
                class="color-swatch"
                [style.background-color]="color"
                [class.active]="brushColor() === color"
                (click)="setBrushColor(color)"
                [attr.aria-label]="color"
              ></button>

              <!-- Custom Color Picker -->
              <div class="custom-color-picker-wrapper">
                <input
                  type="color"
                  id="custom-color-picker"
                  [value]="brushColor()"
                  (input)="onBrushColorPickerChange($event)"
                />
                <label
                  for="custom-color-picker"
                  class="custom-color-label"
                  matTooltip="Custom Color"
                >
                  <mat-icon>palette</mat-icon>
                </label>
              </div>
            </div>
          </div>

          <!-- Size Slider -->
          <div class="panel-section">
            <div class="slider-header">
              <span class="section-label">SIZE</span>
              <span class="size-value">{{ brushSize() }}px</span>
            </div>
            <mat-slider min="1" max="50" step="1" class="size-slider">
              <input
                matSliderThumb
                [value]="brushSize()"
                (input)="onBrushSizeChange($event)"
              />
            </mat-slider>
          </div>

          <!-- History Controls -->
          <div class="panel-section history-section">
            <span class="section-label">HISTORY</span>
            <div class="history-actions">
              <button
                mat-icon-button
                [disabled]="!canUndo()"
                (click)="undo()"
                matTooltip="Undo"
                id="btn-history-undo"
              >
                <mat-icon>undo</mat-icon>
              </button>
              <button
                mat-icon-button
                [disabled]="!canRedo()"
                (click)="redo()"
                matTooltip="Redo"
                id="btn-history-redo"
              >
                <mat-icon>redo</mat-icon>
              </button>
              <button
                mat-icon-button
                (click)="clearDrawing()"
                matTooltip="Clear All"
                id="btn-history-clear"
              >
                <mat-icon>delete_sweep</mat-icon>
              </button>
            </div>
          </div>
        </div>

        <!-- Crop Controls Toolbar (only visible in crop mode or adjust mode) -->
        <div
          class="controls-toolbar"
          *ngIf="activeMode() !== ImageEditorMode.DRAW"
        >
          <mat-form-field
            appearance="outline"
            class="aspect-ratio-dropdown mt-3"
            *ngIf="aspectRatios.length > 1"
          >
            <mat-label>Aspect Ratio</mat-label>
            <mat-select
              [value]="currentAspectRatio"
              (selectionChange)="onAspectRatioChange($event.value)"
            >
              <mat-option
                *ngFor="let ratio of aspectRatios"
                [value]="ratio.value"
              >
                {{ ratio.label }}
              </mat-option>
            </mat-select>
          </mat-form-field>

          <div class="control-group">
            <button mat-icon-button (click)="zoomOut()" matTooltip="Zoom Out">
              <mat-icon>zoom_out</mat-icon>
            </button>
            <button mat-icon-button (click)="zoomIn()" matTooltip="Zoom In">
              <mat-icon>zoom_in</mat-icon>
            </button>
          </div>

          <div class="control-group">
            <button
              mat-icon-button
              (click)="rotateLeft()"
              matTooltip="Rotate Left"
            >
              <mat-icon>rotate_left</mat-icon>
            </button>
            <button
              mat-icon-button
              (click)="rotateRight()"
              matTooltip="Rotate Right"
            >
              <mat-icon>rotate_right</mat-icon>
            </button>
          </div>

          <div class="control-group">
            <button
              mat-icon-button
              (click)="flipHorizontal()"
              matTooltip="Flip Horizontal"
            >
              <mat-icon>flip</mat-icon>
            </button>
            <button
              mat-icon-button
              (click)="flipVertical()"
              matTooltip="Flip Vertical"
              class="flip-vertical"
            >
              <mat-icon>flip</mat-icon>
            </button>
          </div>

          <div class="control-group">
            <button mat-icon-button (click)="moveLeft()" matTooltip="Move Left">
              <mat-icon>keyboard_arrow_left</mat-icon>
            </button>
            <button
              mat-icon-button
              (click)="moveRight()"
              matTooltip="Move Right"
            >
              <mat-icon>keyboard_arrow_right</mat-icon>
            </button>
            <button mat-icon-button (click)="moveUp()" matTooltip="Move Up">
              <mat-icon>keyboard_arrow_up</mat-icon>
            </button>
            <button mat-icon-button (click)="moveDown()" matTooltip="Move Down">
              <mat-icon>keyboard_arrow_down</mat-icon>
            </button>
          </div>
        </div>

        <!-- Workspace Viewport -->
        <div class="workspace-viewport">
          <div
            class="cropper-area"
            [class.hidden]="activeMode() === ImageEditorMode.DRAW"
          >
            <image-cropper
              [imageFile]="imageFile || undefined"
              [options]="options"
              [canvasRotation]="canvasRotation"
              [(transform)]="transform"
              [containWithinAspectRatio]="containWithinAspectRatio"
              format="png"
              (imageCropped)="imageCropped($event)"
            ></image-cropper>
          </div>

          <div class="canvas-area" [class.hidden]="activeMode() !== ImageEditorMode.DRAW">
            <canvas #drawingCanvas class="drawing-canvas"></canvas>
            <input
              #textInput
              *ngIf="textInputCanvas"
              type="text"
              class="canvas-text-input"
              [style.left.px]="textInputCanvas.position.x"
              [style.top.px]="textInputCanvas.position.y"
              [style.borderColor]="brushColor()"
              [style.color]="brushColor()"
              [style.font-size.px]="brushSize()"
              [(ngModel)]="textInputCanvas.value"
              (keydown.enter)="commitText()"
              (blur)="commitText()"
            />
          </div>
        </div>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions>
    <div
      class="controls-row"
      *ngIf="activeMode() !== ImageEditorMode.DRAW"
    >
      <div class="footer-controls">
        <label class="text-white">Fill Aspect Ratio</label>
        <mat-slide-toggle
          [(ngModel)]="containWithinAspectRatio"
        ></mat-slide-toggle>

        <div class="color-picker">
          <label class="text-white">Background</label>
          <input
            type="color"
            [ngModel]="backgroundColor"
            (ngModelChange)="onBackgroundColorChange($event)"
          />
        </div>
      </div>
    </div>

    <div class="buttons-row">
      <studio-button mat-dialog-close [disabled]="isUploading">
        Cancel
      </studio-button>
      <studio-button
        variant="cta"
        size="medium"
        (click)="uploadCroppedImage()"
        [disabled]="isUploading || (activeMode() !== ImageEditorMode.DRAW && !croppedImageBlob)"
      >
        <mat-spinner
          *ngIf="isUploading"
          [diameter]="20"
          class="mr-2 inline-block"
        ></mat-spinner>
        <span *ngIf="!isUploading">Crop & Upload</span>
      </studio-button>
    </div>
  </mat-dialog-actions>
</div>
