<div class="top-left-container fixed z-[101]">
  <ng-container *ngIf="activeWorkspace">
    <div
      class="workspace-container bg-gradient-to-b from-zinc-500/50 to-neutral-700/20 rounded-[48px] shadow-[2px_2px_12px_0px_rgba(0,0,0,0.10)] outline outline-1 outline-offset-[-1px] outline-stone-300/80 backdrop-blur-[10px] z-[1000]"
      [matMenuTriggerFor]="workspaceMenu"
      [matTooltip]="
        'You are on a ' +
        activeWorkspace.scope +
        ' workspace. Click to switch workspaces!'
      "
    >
      <mat-icon>{{
        activeWorkspace.scope === WorkspaceScope.PUBLIC ? 'public' : 'lock'
      }}</mat-icon>
      <span class="workspace-name">{{
        activeWorkspace.name || 'Undefined'
      }}</span>
      <mat-icon>unfold_more</mat-icon>
    </div>

    <mat-menu #workspaceMenu="matMenu" xPosition="after" class="workspace-menu-panel">
      <!-- Search Bar -->
      <div *ngIf="isAdmin || currentUser?.canAccessAdminPanel" class="px-4 py-2" (click)="$event.stopPropagation()">
        <mat-form-field appearance="outline" class="w-full text-sm dense-form-field">
          <mat-icon matPrefix>search</mat-icon>
          <input matInput [formControl]="searchControl" placeholder="Search workspaces...">
        </mat-form-field>
      </div>
      <mat-divider *ngIf="isAdmin"></mat-divider>

      <button
        mat-menu-item
        *ngFor="let workspace of filteredWorkspaces$ | async"
        (click)="setActiveWorkspace(workspace.id)"
        class="!h-auto !py-2"
      >
        <mat-icon
          [style.visibility]="
            activeWorkspaceId === workspace.id ? 'visible' : 'hidden'
          "
          >check</mat-icon
        >
        <mat-icon>{{
          workspace.scope === WorkspaceScope.PUBLIC ? 'public' : 'lock'
        }}</mat-icon>
        
        <div class="flex flex-col leading-tight ml-2">
            <span class="font-medium">{{ workspace.name }}</span>
            <div class="flex items-center gap-2 mt-0.5">
                <span class="text-xs text-zinc-500" *ngIf="workspace.organizationName">{{ workspace.organizationName }}</span>
                
                <!-- Badge Logic -->
                <ng-container *ngIf="currentUser?.isSuperAdmin">
                  <div *ngIf="workspace.members && workspace.members.length > 0; else superadminBadge">
                    <div 
                        class="px-1.5 pt-0.5 rounded border text-[9px] font-bold uppercase tracking-wider"
                        [ngClass]="getRoleBadgeClass(workspace.members[0]?.role || '')"
                    >
                        {{ workspace.members[0].role }}
                    </div>
                  </div>
                  <ng-template #superadminBadge>
                    <div 
                        class="px-1.5 pt-0.5 rounded border text-[9px] font-bold uppercase tracking-wider bg-yellow-300 text-yellow-900 border-yellow-400 superadmin-badge"
                    >
                        Superadmin
                    </div>
                  </ng-template>
                </ng-container>

                <div 
                    class="px-1.5 pt-0.5 rounded border text-[9px] font-bold uppercase tracking-wider"
                    [ngClass]="getRoleBadgeClass(workspace.members[0]?.role || '')"
                    *ngIf="!currentUser?.isSuperAdmin && workspace.members && workspace.members.length > 0"
                >
                    {{ workspace.members[0].role }}
                </div>
            </div>
        </div>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="openCreateWorkspaceDialog()">
        <mat-icon>add</mat-icon>
        <span>Create New Private Workspace</span>
      </button>
      <button
        mat-menu-item
        [disabled]="
          !canAccessBrandGuidelines ||
          (brandGuidelineService.activeBrandGuidelineJob$ | async)?.status ===
            JobStatus.PROCESSING
        "
        (click)="openBrandGuidelinesDialog($event)"
      >
        <ng-container
          *ngIf="brandGuidelineService.activeBrandGuidelineJob$ | async as job"
        >
          <mat-spinner
            *ngIf="job.status === JobStatus.PROCESSING"
            [diameter]="20"
            class="inline-block mr-2"
          ></mat-spinner>
          <mat-icon *ngIf="job.status !== JobStatus.PROCESSING">style</mat-icon>
        </ng-container>
        <mat-icon
          *ngIf="!(brandGuidelineService.activeBrandGuidelineJob$ | async)"
          >style</mat-icon
        >
        <span>Brand Guidelines</span>
      </button>

      <mat-divider></mat-divider>
      <button mat-menu-item (click)="openFeedbackForm($event)">
        <mat-icon>feedback</mat-icon>
        <span>Feedback</span>
      </button>
    </mat-menu>
  </ng-container>
</div>
